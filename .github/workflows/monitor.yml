name: monitor booking status

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9,21 * * *'

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python monitor.py

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add monitor_log.csv
          git diff --cached --quiet || git commit -m "update monitor log"
          git push
          
